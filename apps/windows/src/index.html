<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Triage</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <button id="addSources">📁 Sources</button>
        <button id="rescan">↻ Rescan</button>
        <label id="subfoldersLabel">
          <input id="includeSubfolders" type="checkbox">
          <span>Subfolders</span>
        </label>
        <label id="hiddenLabel">
          <input id="includeHidden" type="checkbox">
          <span>Hidden Files</span>
        </label>
        <select id="language" title="Switch interface language">
          <option value="en">English</option>
          <option value="zh">中文</option>
        </select>
        <span class="spacer"></span>
        <span id="progress" class="progress">0 / 0</span>
        <span id="status" class="status">Choose a folder to begin</span>
        <button id="undo">↶ Undo</button>
      </header>

      <section class="workspace">
        <aside class="sidebar">
          <div class="section-title">
            <span id="sourcesTitle">Sources</span>
            <button id="addSourcesSmall">＋</button>
          </div>
          <div id="sources" class="list empty">Add one or more folders to scan.</div>

          <div class="divider"></div>

          <div class="section-title">
            <span id="targetsTitle">Targets</span>
            <button id="addTargets">＋</button>
          </div>
          <div id="targets" class="list empty">Add target folders to show sorting buttons below.</div>
        </aside>

        <section class="preview-pane">
          <div id="preview" class="preview empty-preview">
            <div class="empty-icon">▣</div>
            <div class="empty-title">No File Selected</div>
            <div class="empty-copy">Choose a source folder or add more files to continue.</div>
          </div>

          <div id="details" class="details hidden">
            <div class="details-main">
              <div id="fileName" class="file-name"></div>
              <div id="fileMeta" class="file-meta"></div>
              <div id="filePath" class="file-path"></div>
            </div>
            <div class="details-actions">
              <button id="reveal">Reveal</button>
              <button id="reload">Reload</button>
              <button id="openFile">Open</button>
            </div>
          </div>

          <div id="actions" class="actions"></div>
        </section>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
